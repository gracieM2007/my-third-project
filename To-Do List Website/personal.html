<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced To-Do List</title>
    <link rel="stylesheet" href="today.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar Menu -->
      <aside class="sidebar">
        <h2>Menu</h2>
        <input type="search" class="search-box" placeholder="Search" />
        <div class="menu-section">
          <h3>Tasks</h3>
          <ul>
            <li onclick="window.location.href='today.html'">
              ☀️Today <span class="count" id="todayCount">0</span>
            </li>
            <li class="active" onclick="window.location.href='upcoming.html'">
              📅Upcoming <span class="count" id="upcomingCount">0</span>
            </li>

            <li onclick="window.location.href='calender.html'">🗓️Calendar</li>
            <li onclick="window.location.href='sticky_wall.html'">
              📝Sticky Wall
            </li>
          </ul>
        </div>
        <div class="menu-section">
          <h3>Lists</h3>
          <ul>
            <li>
              <span class="dot pink"></span> Personal
              <span class="count" id="personalCount">0</span>
            </li>
            <li onclick="window.location.href='work.html'">
              <span class="dot blue"></span> Work
              <span class="count" id="workCount">0</span>
            </li>
            <li onclick="window.location.href='List1.html'">
              <span class="dot yellow"></span> List 1
              <span class="count" id="list1Count">0</span>
            </li>
            <li class="add">+ Add New List</li>
          </ul>
        </div>
        <div class="menu-section">
          <h3>Tags</h3>
          <div class="tags">
            <span class="tag tag-blue">Tag 1</span>
            <span class="tag tag-pink">Tag 2</span>
            <span class="add">+ Add Tag</span>
          </div>
        </div>
        <div class="bottom-links">
          <button>Settings</button>
          <button>Sign out</button>
        </div>
      </aside>

      <!-- Middle Task List -->
      <main class="list-page-container">
        <div class="task-header">
          <h1 id="pageTitle">Personal</h1>
          <span class="count">0</span>
          <button id="addListTaskBtn" class="add-task-main-btn">
            + Add New Task
          </button>
        </div>
        <ul id="listTasks">
          <!-- Tasks will be added here -->
        </ul>
      </main>

      <!-- Task Details Panel -->
      <aside class="task-details" id="taskDetailsPanel">
        <button class="close-panel-btn" id="closePanelBtn">&times;</button>
        <h2>Task:</h2>
        <input id="taskTitle" type="text" placeholder="Task Title" />
        <textarea id="taskDescription" placeholder="Description"></textarea>
        <div>
          <label
            >List:
            <select id="taskListType">
              <option selected>None</option>
              <option>Personal</option>
              <option>Work</option>
              <option>List 1</option>
            </select>
          </label>
        </div>
        <div>
          <label
            >Due date:
            <input type="date" id="taskDueDate" />
          </label>
        </div>
        <div>
          <label>Tags:</label>
          <span class="tag tag-blue">Tag 1</span>
          <span class="add">+ Add Tag</span>
        </div>
        <div>
          <h3 id="subtask-header">Subtasks:</h3>
          <ul id="subtasks"></ul>
          <button id="addSubtaskBtn" class="add-subtask-btn">
            + Add New Subtask
          </button>
        </div>
        <div class="actions">
          <button id="deleteBtn" class="delete-btn">Delete Task</button>
          <button id="saveBtn" class="save-btn">Save changes</button>
        </div>
      </aside>
    </div>
    <script src="script3.js"></script>
  </body>
</html>
